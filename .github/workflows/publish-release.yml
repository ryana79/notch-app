name: Publish NotchPro Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (e.g. 1.0.1)"
        required: true
      build_number:
        description: "Build number (optional, defaults to run number)"
        required: false
  push:
    tags:
      - "v*"

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  PROJECT_NAME: NotchPro
  XCODE_VERSION: "16.4"
  APPCAST_URL: https://raw.githubusercontent.com/ryana79/notch-app/main/updater/appcast.xml

jobs:
  publish:
    name: Build, release, and update appcast
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD: ${{ inputs.build_number }}
          REF_NAME: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" == refs/tags/v* ]]; then
            VERSION="${REF_NAME#refs/tags/v}"
          else
            VERSION="$INPUT_VERSION"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Version is required"
            exit 1
          fi
          BUILD_NUMBER="$INPUT_BUILD"
          if [[ -z "$BUILD_NUMBER" ]]; then
            BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Publishing NotchPro v${VERSION} (${BUILD_NUMBER})"

      - name: Verify Sparkle secret
        run: |
          if [[ -z "${{ secrets.PRIVATE_SPARKLE_KEY }}" ]]; then
            echo "::error::Add repository secret PRIVATE_SPARKLE_KEY (see Configuration/sparkle/SETUP.md)"
            exit 1
          fi

      - name: Prepare broker credentials for CI
        env:
          SCHWAB_CLIENT_ID: ${{ secrets.SCHWAB_CLIENT_ID }}
          SCHWAB_CLIENT_SECRET: ${{ secrets.SCHWAB_CLIENT_SECRET }}
          SCHWAB_TOKEN_PROXY_URL: ${{ secrets.SCHWAB_TOKEN_PROXY_URL }}
          NOTCHPRO_BROKER_PROXY_KEY: ${{ secrets.NOTCHPRO_BROKER_PROXY_KEY }}
          WEBULL_APP_KEY: ${{ secrets.WEBULL_APP_KEY }}
          WEBULL_APP_SECRET: ${{ secrets.WEBULL_APP_SECRET }}
        run: ./scripts/ci-write-broker-plist.sh

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project ${{ env.PROJECT_NAME }}.xcodeproj

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$BUILD_CERTIFICATE_BASE64" ]]; then
            echo "No BUILD_CERTIFICATE_BASE64 secret; using ad-hoc signing"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KC="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC"
          security list-keychain -d user -s "$KC"

      - name: Select Xcode
        run: |
          XCODE_PATH="/Applications/Xcode_${XCODE_VERSION}.app"
          if [[ ! -d "$XCODE_PATH" ]]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Set version and build number
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          PBXPROJ="${{ env.PROJECT_NAME }}.xcodeproj/project.pbxproj"
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${VERSION}/g" "$PBXPROJ"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER}/g" "$PBXPROJ"

      - name: Build Release app
        env:
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM_ID }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p Release
          SIGN_IDENTITY="-"
          KC="$RUNNER_TEMP/app-signing.keychain-db"
          if [[ -n "$BUILD_CERTIFICATE_BASE64" ]]; then
            DEV_ID="$(security find-identity -v -p codesigning "$KC" 2>/dev/null | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -1)"
            if [[ -n "$DEV_ID" ]]; then
              SIGN_IDENTITY="$DEV_ID"
            else
              SIGN_IDENTITY="Apple Development"
            fi
          fi
          xcodebuild \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -configuration Release \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM:-}" \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            build
          APP_PATH="$(find "$RUNNER_TEMP/DerivedData" -path "*/Release/${{ env.PROJECT_NAME }}.app" -type d | head -1)"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "::error::Could not find built .app"
            exit 1
          fi
          ditto "$APP_PATH" "Release/${{ env.PROJECT_NAME }}.app"
          if [[ "$SIGN_IDENTITY" == "-" ]]; then
            codesign --force --deep --sign - "Release/${{ env.PROJECT_NAME }}.app"
          fi

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          VENV_DIR="$RUNNER_TEMP/venv"
          python3 -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install --require-hashes -r Configuration/dmg/requirements.txt
          chmod +x Configuration/dmg/create_dmg.sh
          ./Configuration/dmg/create_dmg.sh \
            "Release/${{ env.PROJECT_NAME }}.app" \
            "Release/${{ env.PROJECT_NAME }}.dmg" \
            "${{ env.PROJECT_NAME }} ${VERSION}"

      - name: Notarize DMG (optional)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.DEVELOPMENT_TEAM_ID }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        run: |
          set -euo pipefail
          DMG="Release/${{ env.PROJECT_NAME }}.dmg"
          if [[ -z "$APPLE_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" || -z "$BUILD_CERTIFICATE_BASE64" ]]; then
            echo "Skipping notarization (add APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + BUILD_CERTIFICATE_BASE64 for Gatekeeper-trusted installs)."
            exit 0
          fi
          APP="Release/${{ env.PROJECT_NAME }}.app"
          KC="$RUNNER_TEMP/app-signing.keychain-db"
          IDENTITY="$(security find-identity -v -p codesigning "$KC" 2>/dev/null | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -1)"
          if [[ -z "$IDENTITY" ]]; then
            IDENTITY="$(security find-identity -v -p codesigning "$KC" 2>/dev/null | sed -n 's/.*"\(.*\)".*/\1/p' | head -1)"
          fi
          if [[ -z "$IDENTITY" ]]; then
            echo "No signing identity in keychain; skipping notarization."
            exit 0
          fi
          codesign --force --deep --options runtime --sign "$IDENTITY" "$APP"
          chmod +x Configuration/dmg/create_dmg.sh
          ./Configuration/dmg/create_dmg.sh "$APP" "$DMG" "${{ env.PROJECT_NAME }} ${VERSION}"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists; refreshing DMG asset"
            gh release upload "v${VERSION}" "Release/${{ env.PROJECT_NAME }}.dmg" --clobber
          else
            gh release create "v${VERSION}" "Release/${{ env.PROJECT_NAME }}.dmg" \
              --title "NotchPro v${VERSION}" \
              --notes "Download NotchPro.dmg and drag to Applications. Updates are delivered automatically via Sparkle."
          fi

      - name: Build Sparkle generate_appcast
        run: |
          set -euo pipefail
          SPARKLE_SRC="$RUNNER_TEMP/Sparkle"
          SPARKLE_DERIVED="$RUNNER_TEMP/sparkle-derived"
          SPARKLE_TAG="2.9.1"
          git clone --depth 1 --branch "$SPARKLE_TAG" https://github.com/sparkle-project/Sparkle "$SPARKLE_SRC"
          xcodebuild -project "$SPARKLE_SRC/Sparkle.xcodeproj" \
            -scheme generate_appcast \
            -configuration Release \
            -derivedDataPath "$SPARKLE_DERIVED" \
            build
          install -m 0755 "$SPARKLE_DERIVED/Build/Products/Release/generate_appcast" "$RUNNER_TEMP/generate_appcast"

      - name: Generate signed appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.PRIVATE_SPARKLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Tag builds checkout a detached HEAD; use main's appcast as the merge base.
          git fetch origin main
          git show origin/main:updater/appcast.xml > updater/appcast.xml
          printf '%s\n' "NotchPro v${VERSION}" > Release/NotchPro.html
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$RUNNER_TEMP/generate_appcast" \
            --ed-key-file - \
            --link "https://github.com/${REPO}/releases" \
            --download-url-prefix "https://github.com/${REPO}/releases/download/v${VERSION}/" \
            --embed-release-notes \
            -o updater/appcast.xml \
            Release/

      - name: Commit appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp updater/appcast.xml "$RUNNER_TEMP/appcast.xml"
          git fetch origin main
          git checkout -f -B main origin/main
          cp "$RUNNER_TEMP/appcast.xml" updater/appcast.xml
          git add updater/appcast.xml
          if git diff --staged --quiet; then
            echo "Appcast unchanged on main; skipping push."
            exit 0
          fi
          git commit -m "Update appcast for v${VERSION}"
          git push origin main

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
          APPCAST_URL: ${{ env.APPCAST_URL }}
        run: |
          {
            echo "## NotchPro v${VERSION} published"
            echo ""
            echo "**Install link for friends:** https://github.com/${REPO}/releases/latest"
            echo ""
            echo "**Appcast:** ${APPCAST_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
